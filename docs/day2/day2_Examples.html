<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 2 — 실습 미정</title>
  <style>
    :root {
      --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eef1f4; --border: #d0d7de;
      --text: #1f2328; --text-dim: #636c76; --accent: #0969da; --accent6: #0550ae;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      word-break: keep-all;
      overflow-wrap: break-word;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
    }
    .layout { display: flex; min-height: 100vh; }
    nav {
      width: 260px; min-width: 260px; background: var(--bg2);
      border-right: 1px solid var(--border); position: sticky; top: 0;
      height: 100vh; overflow-y: auto; padding: 20px 0;
    }
    nav .nav-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-dim); padding: 0 16px 8px;
    }
    nav a {
      display: block; padding: 6px 16px; color: var(--text-dim);
      text-decoration: none; font-size: 13px;
      border-left: 2px solid transparent; transition: all .15s;
    }
    nav a:hover { color: var(--accent); background: var(--bg3); border-left-color: var(--accent); }
    main { flex: 1; max-width: 820px; padding: 40px 48px; }
    h1 { font-size: 1.9rem; font-weight: 700; color: #1f2328; margin-bottom: 6px; }
    .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
    .tbd-box {
      background: #fff8c5; border: 1px solid #d4a72c; border-radius: 8px;
      padding: 24px 28px; margin: 24px 0; text-align: center;
    }
    .tbd-box .big { font-size: 1.4rem; font-weight: 700; color: #7d4e00; margin-bottom: 8px; }
    .tbd-box p { color: #5c3900; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  </style>
</head>
<body>
<div class="layout">

<nav>

  <div class="nav-title">Day 2 · 실습 미정</div>
  <a href="day2_Manual.html">📖 Day 2 이론 문서로 →</a>
</nav>

<main>

  <div class="tbd-box">
    <div class="big">📋 실습 미정</div>
    <p>Day 2의 세부 주제가 확정되는 대로 초급·중급·고급 실습 시나리오가 이 페이지에 채워집니다.</p>
  </div>

  <p style="color: var(--text-dim); font-size: 12px; text-align: center;"><a href="../index.html">← 가이드북 홈으로 돌아가기</a></p>
</main>

</div>

</html>
