
<!DOCTYPE html>

  <title>Day 4 — 커리큘럼 미정</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f6f8fa;
      --bg3: #eef1f4;
      --border: #d0d7de;
      --text: #1f2328;
      --text-dim: #636c76;
      --accent: #0969da;
      --accent2: #1a7f37;
      --accent3: #953800;
      --accent4: #6639ba;
      --accent5: #cf222e;
      --accent6: #0550ae;
      --tag-bg: #ddf4ff;
      --tag-text: #0550ae;
      --code-bg: #f6f8fa;
      --code-border: #d0d7de;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
    }
    .layout { display: flex; min-height: 100vh; }
    nav {
      width: 260px; min-width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto; padding: 20px 0;
    }
    nav .nav-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-dim); padding: 0 16px 8px;
    }
    nav a {
      display: block; padding: 6px 16px; color: var(--text-dim);
      text-decoration: none; font-size: 13px;
      border-left: 2px solid transparent; transition: all .15s;
    }
    nav a:hover { color: var(--accent); background: var(--bg3); border-left-color: var(--accent); }
    main { flex: 1; max-width: 820px; padding: 40px 48px; }
    h1 { font-size: 2rem; font-weight: 700; color: #1f2328; margin-bottom: 6px; }
    .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 32px; }
    h2 {
      font-size: 1.25rem; font-weight: 700; color: var(--accent6);
      margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    p { margin: 8px 0; color: var(--text); }
    .version-box {
      background: #f0f7ff; border: 1px solid #a5d5f7;
      border-left: 4px solid #0969da; border-radius: 6px;
      padding: 14px 18px; margin: 16px 0 32px; font-size: 13px;
    }
    .version-row { display: flex; gap: 12px; padding: 3px 0; border-bottom: 1px solid #d0e8ff; }
    .version-row:last-child { border-bottom: none; }
    .vlabel { min-width: 140px; font-weight: 600; color: #0550ae; flex-shrink: 0; }
    .tbd-box {
      background: #fff8c5; border: 1px solid #d4a72c; border-radius: 8px;
      padding: 24px 28px; margin: 24px 0; text-align: center;
    }
    .tbd-box .big { font-size: 1.4rem; font-weight: 700; color: #7d4e00; margin-bottom: 8px; }
    .tbd-box p { color: #5c3900; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  </style>
</head>
